<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brugere – Herrup Portalen</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c30a14">
  <link rel="stylesheet" href="/assets/app.css" />
  <style>
    .pageTitle { text-align:center; margin:0; font-size:2rem; color:var(--heading); }
    .pageSub   { text-align:center; margin:6px 0 18px; color:#6b7280; font-size:.9rem; }

    /* Faner */
    .tabs { display:flex; gap:.5rem; margin-bottom:1rem; }
    .tab  { appearance:none; border:1px solid #d1d5db; background:#fff; padding:.45rem 1rem;
            border-radius:8px; cursor:pointer; font-size:.92rem; font-weight:600; color:#374151; }
    .tab.active { background:var(--nav-bg); color:#fff; border-color:transparent; }

    /* Adgangs-pills */
    .accessPanelTitle { font-size:.8rem; font-weight:700; text-transform:uppercase;
                        letter-spacing:.06em; color:#6b7280; margin-bottom:.3rem; }
    .roleList  { display:flex; flex-wrap:wrap; gap:.4rem; }
    .rolePill  { display:inline-flex; align-items:center; gap:.3rem; background:#f3f4f6;
                 border:1px solid #e5e7eb; border-radius:999px; padding:.25rem .65rem;
                 font-size:.82rem; font-weight:600; color:#374151; }
    .rolePill.admin { background:#fef3f2; border-color:#fca5a5; color:#850c18; }
    .rolePill .dot  { width:7px; height:7px; border-radius:50%; background:#9ca3af; flex-shrink:0; }
    .rolePill.admin .dot { background:#c30a14; }

    /* Søgebar */
    .userToolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem; }
    .userToolbar .clearable { flex:1; min-width:200px; max-width:380px; }
    #userCount { margin-left:auto; font-size:.85rem; color:#6b7280; white-space:nowrap; }

    /* Tabel */
    .tableWrap { overflow-x:auto; }
    .userTable { width:100%; border-collapse:collapse; font-size:.92rem; }
    .userTable thead th { text-align:left; padding:.55rem .7rem; border-bottom:2px solid #e5e7eb;
                          white-space:nowrap; user-select:none; cursor:pointer; }
    .userTable thead th:hover { background:rgba(0,0,0,.03); }
    .userTable thead th.sort-active { color:var(--accent-bar); }
    .sort-arrow { font-size:.75rem; opacity:.65; }
    .userTable tbody tr:hover { background:rgba(0,0,0,.025); }
    .userTable tbody td { padding:.45rem .7rem; border-bottom:1px solid #f3f4f6; vertical-align:middle; }

    /* Avatar i tabel — klikbar */
    .avatar {
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:50%; background:var(--nav-bg);
      color:#fff; font-size:.8rem; font-weight:700; flex-shrink:0; overflow:hidden;
      cursor:pointer; transition:box-shadow .15s;
    }
    .avatar:hover { box-shadow:0 0 0 3px rgba(133,12,24,.3); }
    .avatar img { width:36px; height:36px; object-fit:cover; border-radius:50%; }
    .nameCell { display:flex; align-items:center; gap:.6rem; }

    /* Status */
    .badge-ok  { background:#d1fae5; color:#065f46; font-size:.78rem; padding:2px 8px; border-radius:999px; }
    .badge-off { background:#fee2e2; color:#991b1b; font-size:.78rem; padding:2px 8px; border-radius:999px; }

    /* Loading/fejl */
    .stateMsg { text-align:center; padding:2.5rem 1rem; color:#6b7280; font-size:.95rem; }
    .stateMsg .spinner { display:inline-block; width:28px; height:28px; border:3px solid #e5e7eb;
                         border-top-color:var(--accent-bar); border-radius:50%;
                         animation:spin .75s linear infinite; margin-bottom:.5rem; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Modal ──────────────────────────────────────────────────────────────── */
    .modal-backdrop {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:1000; align-items:center; justify-content:center; padding:1rem;
    }
    .modal-backdrop.open { display:flex; }
    .modal {
      background:#fff; border-radius:16px; width:100%; max-width:680px;
      max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25);
      display:flex; flex-direction:column;
    }
    .modal-header {
      display:flex; align-items:flex-start; gap:1rem; padding:1.5rem 1.5rem 1rem;
      border-bottom:1px solid #f3f4f6; position:relative;
    }
    .modal-close {
      position:absolute; top:1rem; right:1rem; appearance:none; border:0;
      background:transparent; font-size:1.4rem; cursor:pointer; color:#6b7280; line-height:1;
    }
    .modal-close:hover { color:#111; }
    .modal-big-avatar {
      width:80px; height:80px; border-radius:50%; background:var(--nav-bg);
      color:#fff; font-size:1.4rem; font-weight:700; display:flex; align-items:center;
      justify-content:center; overflow:hidden; flex-shrink:0;
    }
    .modal-big-avatar img { width:80px; height:80px; object-fit:cover; border-radius:50%; }
    .modal-name  { font-size:1.3rem; font-weight:700; margin:0 0 4px; }
    .modal-title { font-size:.9rem; color:#6b7280; margin:0 0 8px; }
    .modal-badges { display:flex; gap:.4rem; flex-wrap:wrap; }
    .modal-badge { background:#f3f4f6; border:1px solid #e5e7eb; border-radius:999px;
                   padding:2px 10px; font-size:.78rem; color:#374151; }

    .modal-body { padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:1.25rem; }

    /* Modal-faner */
    .modal-tabs { display:flex; gap:.4rem; padding:0 1.5rem; margin-top:.75rem; }
    .modal-tab {
      appearance:none; border:0; background:transparent; padding:.5rem .9rem;
      font-size:.85rem; font-weight:600; color:#6b7280; cursor:pointer;
      border-bottom:2px solid transparent;
    }
    .modal-tab.active { color:#850c18; border-bottom-color:#850c18; }
    .modal-tab-panel { display:none; }
    .modal-tab-panel.active { display:flex; flex-direction:column; gap:1.25rem; }

    .hidden-value { color:#9ca3af; font-style:italic; font-weight:400; }

    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem 1.5rem; }
    @media (max-width:500px) { .detail-grid { grid-template-columns:1fr; } }
    .detail-row { display:flex; flex-direction:column; gap:2px; }
    .detail-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#9ca3af; }
    .detail-value { font-size:.9rem; color:#111; font-weight:500; word-break:break-word; }
    .detail-value a { color:inherit; text-decoration:none; }
    .detail-value a:hover { text-decoration:underline; }

    /* Mini org-chart i modal */
    .modal-section-title {
      font-size:.8rem; text-transform:uppercase; letter-spacing:.06em;
      color:#6b7280; font-weight:700; margin-bottom:.6rem;
    }
    .mini-org { display:flex; flex-direction:column; gap:0; }

    /* Manager-kort */
    .mini-card {
      display:flex; align-items:center; gap:.75rem; padding:.6rem .75rem;
      border:1px solid #e5e7eb; border-radius:10px; cursor:pointer;
      transition:background .1s; text-decoration:none; color:inherit;
    }
    .mini-card:hover { background:#f9fafb; border-color:#d1d5db; }
    .mini-card.current { background:#fef3f2; border-color:#fca5a5; cursor:default; }
    .mini-avatar {
      width:36px; height:36px; border-radius:50%; background:var(--nav-bg);
      color:#fff; font-size:.78rem; font-weight:700; display:flex; align-items:center;
      justify-content:center; overflow:hidden; flex-shrink:0;
    }
    .mini-avatar img { width:36px; height:36px; object-fit:cover; border-radius:50%; }
    .mini-name  { font-size:.88rem; font-weight:600; }
    .mini-sub   { font-size:.78rem; color:#6b7280; }
    .mini-tag   { margin-left:auto; font-size:.72rem; background:#f3f4f6;
                  border-radius:999px; padding:2px 8px; color:#6b7280; white-space:nowrap; }
    .mini-tag.you { background:#fef3f2; color:#850c18; }

    /* Connector pil */
    .mini-connector {
      display:flex; justify-content:center; align-items:center;
      height:20px; color:#d1d5db; font-size:1rem;
    }

    /* Direkte rapporter */
    .mini-reports { display:flex; flex-direction:column; gap:.4rem; margin-top:.4rem; }

    /* Org-view */
    #orgView { display:none; overflow-x:auto; padding-bottom:1rem; }
    .org-placeholder { color:#9ca3af; font-size:.85rem; text-align:center; padding:2rem; }

    /* Org tree cards */
    .org-wrap { display:flex; flex-direction:column; align-items:center; }
    .org-card {
      display:flex; flex-direction:column; align-items:center; gap:5px;
      background:#fff; border:1px solid #e5e7eb; border-radius:12px;
      padding:10px 8px; cursor:pointer; transition:box-shadow .15s, border-color .15s;
      width:110px; text-align:center;
    }
    .org-card:hover { border-color:#850c18; box-shadow:0 4px 12px rgba(133,12,24,.12); }
    .org-avatar { width:44px; height:44px; border-radius:50%; background:var(--nav-bg);
                  color:#fff; display:flex; align-items:center; justify-content:center;
                  font-size:.82rem; font-weight:700; overflow:hidden; flex-shrink:0; }
    .org-avatar img { width:44px; height:44px; object-fit:cover; border-radius:50%; }
    .org-name  { font-size:.72rem; font-weight:700; color:#111827; line-height:1.2; word-break:break-word; }
    .org-title { font-size:.65rem; color:#6b7280; line-height:1.2; }
    .org-line-v { width:2px; height:20px; background:#d1d5db; }
    .org-children-row {
      display:flex; gap:12px; justify-content:center;
      position:relative; padding-top:0;
    }
    .org-children-row::before {
      content:""; position:absolute; top:0; left:55px; right:55px;
      height:2px; background:#d1d5db;
    }
    .org-children-row.single::before { display:none; }
    .org-child-col { display:flex; flex-direction:column; align-items:center; }

    @media (max-width:640px) {
      .userTable thead th:nth-child(3),
      .userTable tbody td:nth-child(3),
      .userTable thead th:nth-child(5),
      .userTable tbody td:nth-child(5) { display:none; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="navbar-inner">
      <div class="brand">
        <div class="logo" aria-label="Herrup Portal"></div>
        <div>Brugere</div>
      </div>
      <div class="nav">
        <span id="userLine" class="muted" style="color:#fff;opacity:.9">Henter bruger...</span>
        <span class="sep">|</span>
        <a href="/herrupadmin.html">Rediger privat-info</a>
        <a href="/">← Til portal</a>
        <a href="/logout">Log ud</a>
      </div>
    </div>
    <div class="nav-accent"></div>
  </div>

  <div class="container" style="padding-top:1.5rem">
    <h1 class="pageTitle">Alle brugere</h1>
    <div class="pageSub">Medlemmer af gruppen "Alle - lely center herrup"</div>

    <!-- Min adgang -->
    <div class="panel" id="accessPanel" style="margin-bottom:1rem;display:none;">
      <div class="accessPanelTitle">Din adgang</div>
      <div class="roleList" id="roleList"></div>
    </div>

    <!-- Faner -->
    <div class="tabs">
      <button class="tab active" id="tabList" onclick="switchTab('list')">👥 Liste</button>
      <button class="tab"        id="tabOrg"  onclick="switchTab('org')">🌳 Org chart</button>
    </div>

    <!-- Liste -->
    <div class="panel" id="listView">
      <div class="userToolbar">
        <div class="clearable">
          <input id="search" type="text" placeholder="Søg navn, e-mail, titel…" autocomplete="off" />
          <button class="x" id="searchClear" type="button" title="Ryd">✕</button>
        </div>
        <select id="deptFilter"><option value="">Alle afdelinger</option></select>
        <span id="userCount" class="muted"></span>
      </div>
      <div class="tableWrap">
        <table class="userTable" id="tbl">
          <thead>
            <tr>
              <th data-col="displayName">Navn<span class="sort-arrow"> ▲</span></th>
              <th data-col="mail">E-mail<span class="sort-arrow"> ⇅</span></th>
              <th data-col="jobTitle">Stilling<span class="sort-arrow"> ⇅</span></th>
              <th data-col="department">Afdeling<span class="sort-arrow"> ⇅</span></th>
              <th data-col="businessPhone">Telefon<span class="sort-arrow"> ⇅</span></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5">
              <div class="stateMsg">
                <div class="spinner"></div>
                <div>Henter brugere… foto + manager hentes også</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Org chart -->
    <div class="panel" id="orgView">
      <div id="orgTree" style="overflow-x:auto;padding:1rem 0;min-height:200px;">
        <div class="org-placeholder">Indlæser…</div>
      </div>
    </div>
  </div>

  <!-- ── Modal ──────────────────────────────────────────────────────────────── -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-big-avatar" id="mAvatar"></div>
        <div style="flex:1;min-width:0;">
          <div class="modal-name"  id="mName"></div>
          <div class="modal-title" id="mTitle"></div>
          <div class="modal-badges" id="mBadges"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" id="mtArbejde" onclick="switchModalTab('arbejde')">Arbejde</button>
        <button class="modal-tab" id="mtPrivat" onclick="switchModalTab('privat')">Privat</button>
      </div>
      <div class="modal-body">
        <!-- Arbejde -->
        <div class="modal-tab-panel active" id="panelArbejde">
          <div>
            <div class="modal-section-title">Kontakt</div>
            <div class="detail-grid" id="mDetails"></div>
          </div>
          <div id="mOrgSection">
            <div class="modal-section-title">Organisation</div>
            <div class="mini-org" id="mOrg"></div>
          </div>
        </div>
        <!-- Privat -->
        <div class="modal-tab-panel" id="panelPrivat">
          <div>
            <div class="modal-section-title">Privat kontakt</div>
            <div class="detail-grid" id="mPrivatDetails">
              <div class="stateMsg" style="grid-column:1/-1;padding:1.5rem 0;">
                <div class="spinner"></div>
                <div>Henter…</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let allUsers = [];
    let byId     = new Map();
    let sortCol  = "displayName";
    let sortDir  = 1;

    // ── Init ──────────────────────────────────────────────────────────────────
    (async function init() {
      let me = null;
      try { me = await getMe(); } catch {}
      const userLine = document.getElementById("userLine");
      if (userLine) userLine.textContent = me?.userDetails || "";

      const roles = expandRoles(rolesFromMe(me));
      renderAccessPanel(roles);

      if (!roles.includes("portal_admin")) {
        renderError("Du har ikke adgang til denne side.");
        return;
      }

      try {
        const r = await fetch("/api/entra-users", { cache: "no-store" });
        if (!r.ok) {
          const b = await r.json().catch(() => ({}));
          throw new Error(b.error || `HTTP ${r.status}`);
        }
        allUsers = await r.json();
        byId = new Map(allUsers.map(u => [u.id, u]));
        buildDeptFilter(allUsers);
        renderTable();
        renderOrg();
      } catch (e) {
        renderError("Kunne ikke hente brugere: " + e.message);
      }
    })();

    // ── Faner ─────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById("listView").style.display = tab === "list" ? "" : "none";
      document.getElementById("orgView").style.display  = tab === "org"  ? "" : "none";
      document.getElementById("tabList").classList.toggle("active", tab === "list");
      document.getElementById("tabOrg").classList.toggle("active",  tab === "org");
    }

    // ── Adgangs-panel ─────────────────────────────────────────────────────────
    function renderAccessPanel(roles) {
      const panel  = document.getElementById("accessPanel");
      const listEl = document.getElementById("roleList");
      const display = roles.filter(r => r !== "anonymous" && r !== "authenticated");
      if (!display.length) return;
      listEl.innerHTML = display.map(r => {
        const isAdmin = r === "portal_admin";
        return `<span class="rolePill ${isAdmin?"admin":""}"><span class="dot"></span>${esc(r)}</span>`;
      }).join("");
      panel.style.display = "";
    }

    // ── businessPhone hjælper ─────────────────────────────────────────────────
    function bizPhone(u) {
      return Array.isArray(u.businessPhones) ? (u.businessPhones[0] || "") : (u.businessPhones || "");
    }

    // ── Tabel ─────────────────────────────────────────────────────────────────
    function getFiltered() {
      const q    = (document.getElementById("search")?.value || "").toLowerCase().trim();
      const dept = document.getElementById("deptFilter")?.value || "";
      return allUsers
        .filter(u => {
          if (dept && (u.department || "") !== dept) return false;
          if (!q) return true;
          return (u.displayName||"").toLowerCase().includes(q)
              || (u.mail||"").toLowerCase().includes(q)
              || (u.jobTitle||"").toLowerCase().includes(q)
              || bizPhone(u).toLowerCase().includes(q);
        })
        .slice()
        .sort((a, b) => {
          if (sortCol === "accountEnabled") {
            return ((a[sortCol]===true?1:0) - (b[sortCol]===true?1:0)) * sortDir;
          }
          if (sortCol === "businessPhone") {
            return bizPhone(a).localeCompare(bizPhone(b), "da") * sortDir;
          }
          return String(a[sortCol]??"").localeCompare(String(b[sortCol]??""), "da") * sortDir;
        });
    }

    function renderTable() {
      const rows  = getFiltered();
      const tbody = document.getElementById("tbody");
      const count = document.getElementById("userCount");
      if (count) count.textContent = `${rows.length} brugere`;
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="stateMsg">Ingen resultater</div></td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(u => {
        const av = avatarHTML(u, 36);
        return `<tr>
          <td><div class="nameCell">
            <div class="avatar" onclick="openModal('${esc(u.id)}')" title="Se detaljer">${av}</div>
            <div style="cursor:pointer" onclick="openModal('${esc(u.id)}')">${esc(u.displayName||"–")}</div>
          </div></td>
          <td><a href="mailto:${esc(u.mail||"")}" style="color:inherit">${esc(u.mail||"–")}</a></td>
          <td>${esc(u.jobTitle||"–")}</td>
          <td>${esc(u.department||"–")}</td>
          <td>${esc(bizPhone(u)||"–")}</td>
        </tr>`;
      }).join("");
    }

    function buildDeptFilter(users) {
      const depts = [...new Set(users.map(u => u.department).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "da"));
      const sel = document.getElementById("deptFilter");
      depts.forEach(d => {
        const o = document.createElement("option");
        o.value = d; o.textContent = d; sel.appendChild(o);
      });
    }

    const searchEl = document.getElementById("search");
    const clearBtn = document.getElementById("searchClear");
    function syncClear() { if (clearBtn) clearBtn.style.visibility = searchEl?.value ? "visible" : "hidden"; }
    searchEl?.addEventListener("input", () => { syncClear(); renderTable(); });
    clearBtn?.addEventListener("click", () => { if (searchEl) searchEl.value = ""; syncClear(); renderTable(); });
    document.getElementById("deptFilter")?.addEventListener("change", renderTable);
    syncClear();

    document.querySelectorAll("#tbl thead th[data-col]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.getAttribute("data-col");
        if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
        updateSortHeaders(); renderTable();
      });
    });
    function updateSortHeaders() {
      document.querySelectorAll("#tbl thead th[data-col]").forEach(th => {
        const col = th.getAttribute("data-col");
        th.classList.toggle("sort-active", col === sortCol);
        const arrow = th.querySelector(".sort-arrow");
        if (arrow) arrow.textContent = col === sortCol ? (sortDir===1?" ▲":" ▼") : " ⇅";
      });
    }

    // ── Modal ──────────────────────────────────────────────────────────────────
    function openModal(userId) {
      const u = byId.get(userId);
      if (!u) return;

      // Header
      document.getElementById("mAvatar").innerHTML = avatarHTML(u, 80);
      document.getElementById("mName").textContent  = u.displayName || "";
      document.getElementById("mTitle").textContent = u.jobTitle    || "";

      const badges = [];
      if (u.department)       badges.push(u.department);
      if (u.officeLocation)   badges.push(u.officeLocation);
      if (u.accountEnabled === false) badges.push("Deaktiveret");
      document.getElementById("mBadges").innerHTML = badges
        .map(b => `<span class="modal-badge">${esc(b)}</span>`).join("");

      // Kontaktdetaljer (Arbejde) — Mobil og Kontor er fjernet
      const phone = bizPhone(u);
      const details = [
        { label: "E-mail",   value: u.mail    ? `<a href="mailto:${esc(u.mail)}">${esc(u.mail)}</a>`  : "–" },
        { label: "Telefon",  value: phone      ? `<a href="tel:${esc(phone)}">${esc(phone)}</a>`       : "–" },
        { label: "Stilling", value: esc(u.jobTitle    || "–") },
        { label: "Afdeling", value: esc(u.department  || "–") },
      ];
      document.getElementById("mDetails").innerHTML = details.map(d =>
        `<div class="detail-row">
          <div class="detail-label">${d.label}</div>
          <div class="detail-value">${d.value}</div>
        </div>`
      ).join("");

      // Mini org-chart
      renderMiniOrg(u);

      // Nulstil til Arbejde-fanen og hent privat-data
      switchModalTab("arbejde");
      loadPrivateTab(u);

      document.getElementById("modalBackdrop").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function switchModalTab(tab) {
      document.getElementById("panelArbejde").classList.toggle("active", tab === "arbejde");
      document.getElementById("panelPrivat").classList.toggle("active", tab === "privat");
      document.getElementById("mtArbejde").classList.toggle("active", tab === "arbejde");
      document.getElementById("mtPrivat").classList.toggle("active", tab === "privat");
    }

    async function loadPrivateTab(u) {
      const target = document.getElementById("mPrivatDetails");
      target.innerHTML = `<div class="stateMsg" style="grid-column:1/-1;padding:1.5rem 0;">
        <div class="spinner"></div><div>Henter…</div></div>`;

      const lookupEmail = u.mail || u.userPrincipalName;
      if (!lookupEmail) {
        target.innerHTML = renderPrivateFields({});
        return;
      }

      try {
        const r = await fetch(`/api/employee-private/${encodeURIComponent(lookupEmail)}`, { cache: "no-store" });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        target.innerHTML = renderPrivateFields(data);
      } catch (e) {
        target.innerHTML = `<div class="stateMsg" style="grid-column:1/-1;color:#c30a14;">
          Kunne ikke hente privat info: ${esc(e.message)}</div>`;
      }
    }

    function renderPrivateFields(d) {
      const valueOrHidden = (value, visesFlag) => {
        if (visesFlag === false) return `<span class="hidden-value">vises ikke</span>`;
        return esc(value || "–");
      };

      const rows = [
        { label: "Privat mail",     value: esc(d.privatMail || "–") },
        { label: "Privat telefon",  value: valueOrHidden(d.privatTlf, d.telefonVises) },
        { label: "Privat adresse",  value: valueOrHidden(d.privatAdresse, d.adresseVises) },
        { label: "Privat postby",   value: valueOrHidden(d.privatPostby, d.adresseVises) },
      ];

      return rows.map(row =>
        `<div class="detail-row">
          <div class="detail-label">${row.label}</div>
          <div class="detail-value">${row.value}</div>
        </div>`
      ).join("");
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("open");
      document.body.style.overflow = "";
    }
    function closeModalOnBackdrop(e) {
      if (e.target === document.getElementById("modalBackdrop")) closeModal();
    }
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // ── Mini org-chart i modal ─────────────────────────────────────────────────
    function renderMiniOrg(user) {
      const container = document.getElementById("mOrg");
      container.innerHTML = "";

      // Find manager-kæde opad (maks 2 niveauer)
      const chain = [];
      let cur = user;
      for (let i = 0; i < 2; i++) {
        const mgr = cur.managerId ? byId.get(cur.managerId) : null;
        if (!mgr) break;
        chain.unshift(mgr);
        cur = mgr;
      }

      // Find direkte rapporter
      const reports = allUsers
        .filter(u => u.managerId === user.id)
        .sort((a, b) => (a.displayName||"").localeCompare(b.displayName||"", "da"));

      // Tegn manager-kæde
      chain.forEach(mgr => {
        container.appendChild(makeMiniCard(mgr, "manager", () => { closeModal(); setTimeout(() => openModal(mgr.id), 50); }));
        const arrow = document.createElement("div");
        arrow.className = "mini-connector";
        arrow.textContent = "↓";
        container.appendChild(arrow);
      });

      // Nuværende bruger
      container.appendChild(makeMiniCard(user, "current"));

      // Direkte rapporter
      if (reports.length) {
        const arrow = document.createElement("div");
        arrow.className = "mini-connector";
        arrow.textContent = "↓";
        container.appendChild(arrow);

        const label = document.createElement("div");
        label.style.cssText = "font-size:.78rem;color:#6b7280;margin-bottom:.4rem;";
        label.textContent = `${reports.length} direkte rapporter`;
        container.appendChild(label);

        const reportsEl = document.createElement("div");
        reportsEl.className = "mini-reports";
        reports.forEach(r => {
          reportsEl.appendChild(makeMiniCard(r, "report", () => { closeModal(); setTimeout(() => openModal(r.id), 50); }));
        });
        container.appendChild(reportsEl);
      }
    }

    function makeMiniCard(user, role, onClick) {
      const div = document.createElement("div");
      div.className = "mini-card" + (role === "current" ? " current" : "");
      if (onClick) div.addEventListener("click", onClick);

      const tagText = role === "manager" ? "Manager" : role === "report" ? "Rapport" : "Dig";
      const tagClass = role === "current" ? "mini-tag you" : "mini-tag";

      div.innerHTML = `
        <div class="mini-avatar">${avatarHTML(user, 36)}</div>
        <div>
          <div class="mini-name">${esc(user.displayName||"")}</div>
          <div class="mini-sub">${esc(user.jobTitle||"")}</div>
        </div>
        <span class="${tagClass}">${tagText}</span>`;
      return div;
    }

    // ── Org chart (fuld) ──────────────────────────────────────────────────────
    function renderOrg() {
      const container = document.getElementById("orgTree");
      if (!allUsers.length) {
        container.innerHTML = `<div class="org-placeholder">Ingen brugere</div>`;
        return;
      }

      const groupIds = new Set(allUsers.map(u => u.id));
      const childMap = new Map();
      allUsers.forEach(u => {
        if (u.managerId && groupIds.has(u.managerId)) {
          if (!childMap.has(u.managerId)) childMap.set(u.managerId, []);
          childMap.get(u.managerId).push(u);
        }
      });
      childMap.forEach(arr => arr.sort((a,b) => (a.displayName||"").localeCompare(b.displayName||"","da")));

      const roots = allUsers
        .filter(u => !u.managerId || !groupIds.has(u.managerId))
        .sort((a,b) => (a.displayName||"").localeCompare(b.displayName||"","da"));

      container.innerHTML = "";

      function buildNode(user) {
        const wrap = document.createElement("div");
        wrap.className = "org-wrap";

        const card = document.createElement("div");
        card.className = "org-card";
        card.innerHTML = `
          <div class="org-avatar">${avatarHTML(user, 44)}</div>
          <div class="org-name">${esc(user.displayName||"")}</div>
          <div class="org-title">${esc(user.jobTitle||"")}</div>`;
        card.addEventListener("click", () => openModal(user.id));
        wrap.appendChild(card);

        const kids = childMap.get(user.id) || [];
        if (kids.length) {
          const vLine = document.createElement("div");
          vLine.className = "org-line-v";
          wrap.appendChild(vLine);

          const row = document.createElement("div");
          row.className = "org-children-row" + (kids.length === 1 ? " single" : "");
          kids.forEach(kid => {
            const col = document.createElement("div");
            col.className = "org-child-col";
            const vUp = document.createElement("div");
            vUp.className = "org-line-v";
            col.appendChild(vUp);
            col.appendChild(buildNode(kid));
            row.appendChild(col);
          });
          wrap.appendChild(row);
        }
        return wrap;
      }

      if (roots.length === 1) {
        container.appendChild(buildNode(roots[0]));
      } else {
        const row = document.createElement("div");
        row.style.cssText = "display:flex;gap:24px;justify-content:center;flex-wrap:wrap;";
        roots.forEach(r => row.appendChild(buildNode(r)));
        container.appendChild(row);
      }
    }

    // ── Hjælpere ─────────────────────────────────────────────────────────────
    function avatarHTML(user, size) {
      if (user.photo) {
        return `<img src="${user.photo}" alt="" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%;" />`;
      }
      return esc(makeInitials(user.displayName));
    }
    function makeInitials(name) {
      if (!name) return "?";
      return name.trim().split(/\s+/).slice(0, 2).map(p => p[0].toUpperCase()).join("");
    }
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m =>
        ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    }
    function renderError(msg) {
      document.getElementById("tbody").innerHTML =
        `<tr><td colspan="5"><div class="stateMsg" style="color:#c30a14">${esc(msg)}</div></td></tr>`;
    }
  </script>
</body>
</html>
