<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin – Herrup Portalen</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c30a14">

  <link rel="stylesheet" href="/assets/app.css" />
  <style>
    .tableToolbar {
      display: flex;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: .75rem;
    }
    .tableToolbar .clearable {
      flex: 1;
      min-width: 160px;
      max-width: 300px;
    }
    .tableToolbar select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: .45rem .6rem;
      font-size: .92rem;
      background: #fff;
    }
    #tableCount {
      margin-left: auto;
      font-size: .85rem;
      color: #6b7280;
      white-space: nowrap;
    }
    #tbl thead th[data-col]:hover { background: rgba(0,0,0,.04); }
    #tbl thead th.sort-active { color: var(--accent-bar); }
    .sort-arrow { font-size: .75rem; opacity: .7; }
    .tableWrap { overflow-x: auto; }
    .table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .table thead th {
      text-align: left;
      padding: .5rem .6rem;
      border-bottom: 2px solid #e5e7eb;
      white-space: nowrap;
      user-select: none;
    }
    .table tbody tr:hover { background: rgba(0,0,0,.025); }
    .table tbody td { padding: .45rem .6rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  </style>
</head>

<body class="adminPage">
  <div class="navbar">
    <div class="navbar-inner">
      <div class="brand">
        <div class="logo" aria-label="Herrup Portal"></div>
        <div>Admin</div>
      </div>

      <div class="nav">
        <a href="/">← Til portal</a>
        <a href="/.auth/logout?post_logout_redirect_uri=/.auth/login/aad">Log ud</a>
      </div>
    </div>
    <div class="nav-accent"></div>
  </div>

  <div class="container" style="padding-top:1.5rem">
    <h1 class="adminTitle">Opret / redigér link</h1>
    <div class="muted adminSub">Tilføj / redigér / fjern apps og links</div>

    <div class="panel">
      <form id="form" class="adminForm" autocomplete="off">
        <input id="id" type="hidden" />

        <div class="formRow">
          <label for="title">Titel</label>
          <input id="title" class="field" autocomplete="off" />
        </div>

        <div class="formRow">
          <label for="url">URL</label>
          <input id="url" class="field" placeholder="https://..." autocomplete="off" />
        </div>

        <div class="formRow">
          <label for="description">Forklaring</label>
          <input id="description" class="field" maxlength="150" placeholder="Kort forklaring til hvad tile gør" autocomplete="off" />
        </div>

        <div class="formRow">
          <label for="category">Kategori</label>
          <select id="category" class="field"></select>
        </div>

        <!-- Gruppe (kun favoritter) -->
        <div class="formRow" id="groupRow">
          <label for="group">Gruppe (favoritter)</label>
          <select id="group" class="field"></select>
        </div>

        <!-- Undergruppe (kun favoritter) -->
        <div class="formRow" id="subgroupRow">
          <label for="subgroup">Undergruppe (favoritter)</label>
          <select id="subgroup" class="field"></select>
        </div>

        <div class="formRow">
          <label for="platformHint">Platform</label>
          <select id="platformHint" class="field"></select>
        </div>

        <div class="formRow">
          <label for="parent">Parent</label>
          <select id="parent" class="field">
            <option value="">(ingen parent)</option>
          </select>
        </div>

        <div class="formRow">
          <label for="icon">Ikon (emoji eller tekst)</label>
          <div class="previewBox">
            <input id="icon" class="field" list="iconList" />
            <datalist id="iconList"></datalist>

            <span class="muted">Preview</span>
            <span id="iconPreview" class="previewIcon">🔗</span>
          </div>
        </div>

        <div class="formRow">
          <label for="roles">Allowed roles (semikolon-separeret)</label>
          <input id="roles" class="field" placeholder="portal_user;portal_admin" />
        </div>

        <div class="formRow">
          <label for="sort">Sort order</label>
          <input id="sort" class="field" type="number" />
        </div>

        <div class="formRow">
          <label for="openMode">Åbn</label>
          <select id="openMode" class="field">
            <option value="newTab">Ny fane</option>
            <option value="sameTab">Samme fane</option>
          </select>
        </div>

        <div class="formRow">
          <label>Aktiv</label>
          <div class="formInline">
            <label class="formInline" style="gap:8px; font-weight:600">
              <input id="enabled" type="checkbox" checked />
              Aktiv
            </label>
          </div>
        </div>

        <div class="formActions">
          <button class="btn primary" type="submit">Gem</button>
          <button class="btn" type="button" id="resetBtn">Nulstil</button>
          <span id="msg" class="muted"></span>
        </div>
      </form>
    </div>

    <div class="panel" style="margin-top:16px">
      <div class="toolbar" style="margin-bottom:10px">
        <div class="left">
          <div class="sectionTitle" style="margin:0">Links</div>
        </div>
        <div class="muted">Tip: "Parent" kræver en række uden URL (mappe)</div>
      </div>

      <!-- Søg og filtre -->
      <div class="tableToolbar">
        <div class="clearable">
          <input id="tableSearch" type="text" placeholder="Søg titel, URL, rolle…" />
          <button id="tableClearSearch" class="x" type="button" title="Ryd søgning">✕</button>
        </div>
        <select id="tableFilterCat">
          <option value="">Alle kategorier</option>
        </select>
        <select id="tableFilterEnabled">
          <option value="">Alle</option>
          <option value="ja">Kun aktive</option>
          <option value="nej">Kun inaktive</option>
        </select>
        <span id="tableCount" class="muted"></span>
      </div>

      <div class="tableWrap">
        <table class="table" id="tbl">
          <thead>
            <tr>
              <th data-col="title">Titel<span class="sort-arrow"> ⇅</span></th>
              <th data-col="description">Forklaring<span class="sort-arrow"> ⇅</span></th>
              <th data-col="category">Kategori<span class="sort-arrow"> ⇅</span></th>
              <th data-col="group">Gruppe<span class="sort-arrow"> ⇅</span></th>
              <th data-col="subgroup">Undergruppe<span class="sort-arrow"> ⇅</span></th>
              <th data-col="platformHint">Platform<span class="sort-arrow"> ⇅</span></th>
              <th>Parent</th>
              <th data-col="enabled">Aktiv<span class="sort-arrow"> ⇅</span></th>
              <th data-col="allowedRoles">Roles<span class="sort-arrow"> ⇅</span></th>
              <th data-col="sort">Sort<span class="sort-arrow"> ▲</span></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
